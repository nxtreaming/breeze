{{define "layout"}}<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Breeze App</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f5f5f5; color: #333; }
    nav { background: #1a1a2e; padding: 1rem 2rem; display: flex; gap: 1.5rem; }
    nav a { color: #eee; text-decoration: none; font-weight: 500; transition: color .2s; }
    nav a:hover { color: #7c83fd; }
    #breeze-app { max-width: 960px; margin: 2rem auto; padding: 0 1rem; }
    .loading { opacity: 0.5; transition: opacity .15s; }
  </style>
</head>
<body>
  {{component "nav" .}}
  <div id="breeze-app">
    {{template "content" .}}
  </div>
</body>
</html>
{{end}}

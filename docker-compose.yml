services:
  breeze:
    build:
      context: .
      args:
        # Any main package in the module can be containerized.
        BREEZE_TARGET: ./cmd
    image: breeze-example:latest
    container_name: breeze
    ports:
      - "3000:3000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3
    # Static files served at /files by the example server.
    volumes:
      - ./files:/app/files:ro
